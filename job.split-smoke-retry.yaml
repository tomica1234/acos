requester_input: |
  Build a small Python notes library without external dependencies.

  Required behavior:
  - Create a notes.py module.
  - Define a Note dataclass with title, body, and done fields.
  - Define an in-memory NotesStore class with add, list_all, mark_done, and delete methods.
  - Add focused pytest tests for add/list, mark_done, delete, and missing-id errors.
  - Add a short README.md with usage examples.

  Planning requirement:
  - Split the implementation into separate planned tasks:
    1. model and store creation
    2. behavior refinement and README
    3. pytest coverage
  - Keep each implementation task small and complete.

  Constraints:
  - Use only the Python standard library.
  - Do not create a web app.
  - Do not add dependencies.
  - Tests must pass with pytest.

