providers:
  local_ornith:
    type: openai_compatible
    base_url: "${LOCAL_ORNITH_BASE_URL:-http://localhost:8000/v1}"
    api_key_env: "ORNITH_API_KEY"
    timeout_seconds: "${LOCAL_ORNITH_TIMEOUT_SECONDS:-420}"
    default_headers: {}
    supports_tools: true
    supports_json_mode: true
    supports_structured_output: false
    supports_streaming: true
    max_context_tokens: 4096
    default_max_output_tokens: 2048

  mock_provider:
    type: mock
    base_url: "mock://local"
    api_key_env: "MOCK_API_KEY"
    timeout_seconds: 1
    default_headers: {}
    supports_tools: true
    supports_json_mode: true
    supports_structured_output: true
    supports_streaming: false
    max_context_tokens: 262144
    default_max_output_tokens: 8192

models:
  ornith_35b_q4:
    provider: local_ornith
    model: "ornith-1.0-35b-Q4_K_M.gguf"
    display_name: "Ornith 1.0 35B Q4_K_M"
    max_context_tokens: 4096
    max_output_tokens: 2048
    supports_tool_calling: true
    supports_structured_output: false
    supports_json_repair: true
    tags: ["coding", "gguf", "quantized", "agentic"]

  mock_structured:
    provider: mock_provider
    model: "mock/structured"
    display_name: "Mock Structured"
    max_context_tokens: 262144
    max_output_tokens: 8192
    supports_tool_calling: true
    supports_structured_output: true
    tags: ["testing", "structured", "agentic"]

  mock_small:
    provider: mock_provider
    model: "mock/small"
    display_name: "Mock Small"
    max_context_tokens: 65536
    max_output_tokens: 4096
    supports_tool_calling: false
    supports_structured_output: true
    tags: ["testing", "cheap"]
