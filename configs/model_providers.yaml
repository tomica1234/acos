# Provider and model catalog. Edit base_url and api_key_env for your local endpoints.
providers:
  local_qwen:
    type: openai_compatible
    base_url: "http://localhost:8000/v1"
    api_key_env: "QWEN_API_KEY"
    timeout_seconds: 120
    default_headers: {}
    supports_tools: true
    supports_json_mode: false
    supports_streaming: true
    max_context_tokens: 262144
    default_max_output_tokens: 32768

  local_small:
    type: openai_compatible
    base_url: "http://localhost:8001/v1"
    api_key_env: "SMALL_MODEL_API_KEY"
    timeout_seconds: 60
    default_headers: {}
    supports_tools: true
    supports_json_mode: false
    supports_streaming: true
    max_context_tokens: 32768
    default_max_output_tokens: 8192

  mock_provider:
    type: mock
    base_url: "mock://local"
    api_key_env: "MOCK_API_KEY"
    timeout_seconds: 1
    default_headers: {}
    supports_tools: true
    supports_json_mode: true
    supports_streaming: false
    max_context_tokens: 262144
    default_max_output_tokens: 8192

models:
  qwen_35b:
    provider: local_qwen
    model: "Qwen/Qwen3.6-35B-A3B"
    display_name: "Qwen 3.6 35B A3B"
    max_context_tokens: 262144
    max_output_tokens: 32768
    supports_tool_calling: true
    supports_structured_output: false
    tags: ["coding", "long-context", "agentic"]

  qwen_small:
    provider: local_small
    model: "Qwen/Qwen2.5-Coder-7B-Instruct"
    display_name: "Qwen Small Coder"
    max_context_tokens: 32768
    max_output_tokens: 8192
    supports_tool_calling: true
    supports_structured_output: false
    tags: ["coding", "cheap", "summarizer"]

  mock_structured:
    provider: mock_provider
    model: "mock/structured"
    display_name: "Mock Structured"
    max_context_tokens: 262144
    max_output_tokens: 8192
    supports_tool_calling: true
    supports_structured_output: true
    tags: ["testing", "structured", "agentic"]

  mock_small:
    provider: mock_provider
    model: "mock/small"
    display_name: "Mock Small"
    max_context_tokens: 65536
    max_output_tokens: 4096
    supports_tool_calling: false
    supports_structured_output: true
    tags: ["testing", "cheap"]
