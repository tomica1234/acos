# Role-to-model mapping, role budgets, and role-level tool permissions.
agents:
  pm:
    primary_model: qwen_35b
    fallback_models:
      - qwen_small
    temperature: 0.2
    top_p: 0.8
    max_output_tokens: 12000
    context_budget_tokens: 96000
    allow_tools: true
    allowed_tools:
      - memory_server.write_memory
      - memory_server.read_memory
      - repo_server.repo_tree
    require_json_schema: true
    escalation_policy: {}
    output_schema: PRD

  architect:
    primary_model: qwen_35b
    fallback_models:
      - qwen_small
    temperature: 0.1
    top_p: 0.8
    max_output_tokens: 16000
    context_budget_tokens: 128000
    allow_tools: true
    allowed_tools:
      - memory_server.read_memory
      - memory_server.write_memory
      - repo_server.repo_tree
      - repo_server.read_file
      - repo_server.search_text
    require_json_schema: true
    escalation_policy: {}
    output_schema: ArchitecturePlan

  planner:
    primary_model: qwen_35b
    fallback_models:
      - qwen_small
    temperature: 0.2
    top_p: 0.8
    max_output_tokens: 12000
    context_budget_tokens: 96000
    allow_tools: true
    allowed_tools:
      - memory_server.read_memory
      - memory_server.write_memory
      - repo_server.repo_tree
      - repo_server.search_text
    require_json_schema: true
    escalation_policy: {}
    output_schema: TaskGraph

  implementer:
    primary_model: qwen_35b
    fallback_models:
      - qwen_small
    temperature: 0.1
    top_p: 0.8
    max_output_tokens: 20000
    context_budget_tokens: 128000
    allow_tools: true
    allowed_tools:
      - repo_server.read_file
      - repo_server.search_text
      - repo_server.apply_patch
      - git_server.diff
    require_json_schema: true
    escalation_policy:
      repeated_failures_gte: 2
    output_schema: ImplementationResult

  test_writer:
    primary_model: qwen_35b
    fallback_models:
      - qwen_small
    temperature: 0.1
    top_p: 0.8
    max_output_tokens: 16000
    context_budget_tokens: 96000
    allow_tools: true
    allowed_tools:
      - repo_server.read_file
      - repo_server.search_text
      - repo_server.apply_patch
      - git_server.diff
    require_json_schema: true
    escalation_policy: {}
    output_schema: TestWriterResult

  reviewer:
    primary_model: qwen_35b
    fallback_models:
      - qwen_small
    temperature: 0.0
    top_p: 0.8
    max_output_tokens: 12000
    context_budget_tokens: 96000
    allow_tools: true
    allowed_tools:
      - repo_server.read_file
      - git_server.diff
      - memory_server.read_memory
    require_json_schema: true
    escalation_policy: {}
    output_schema: ReviewResult

  security_reviewer:
    primary_model: qwen_35b
    fallback_models:
      - qwen_small
    temperature: 0.0
    top_p: 0.8
    max_output_tokens: 12000
    context_budget_tokens: 96000
    allow_tools: true
    allowed_tools:
      - repo_server.read_file
      - git_server.diff
      - memory_server.read_memory
    require_json_schema: true
    escalation_policy:
      security_sensitive: true
    output_schema: SecurityReviewResult

  fixer:
    primary_model: qwen_small
    fallback_models:
      - qwen_35b
      - qwen_small
    temperature: 0.1
    top_p: 0.8
    max_output_tokens: 8192
    context_budget_tokens: 32768
    allow_tools: true
    allowed_tools:
      - repo_server.read_file
      - repo_server.search_text
      - repo_server.apply_patch
      - git_server.diff
      - memory_server.read_memory
      - memory_server.write_memory
    require_json_schema: true
    escalation_policy:
      repeated_failures_gte: 2
    output_schema: FixResult

  release_manager:
    primary_model: qwen_small
    fallback_models:
      - qwen_35b
      - qwen_small
    temperature: 0.0
    top_p: 0.8
    max_output_tokens: 8192
    context_budget_tokens: 32768
    allow_tools: true
    allowed_tools:
      - git_server.status
      - git_server.diff
      - git_server.commit
      - memory_server.read_memory
      - notify_server.send_notification
    require_json_schema: true
    escalation_policy: {}
    output_schema: ReleaseResult

  summarizer:
    primary_model: qwen_small
    fallback_models:
      - qwen_35b
      - qwen_small
    temperature: 0.0
    top_p: 0.8
    max_output_tokens: 8192
    context_budget_tokens: 32768
    allow_tools: true
    allowed_tools:
      - memory_server.read_memory
      - memory_server.write_memory
    require_json_schema: true
    escalation_policy: {}
    output_schema: SummaryResult
